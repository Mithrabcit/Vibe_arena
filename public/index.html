<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeNet | Sleek Glassmorphic Social Media Hub</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Connect, vibe, and share. Experience the next level of social interactions on VibeNet with glowing glassmorphism and real-time feeds.">
  <meta name="keywords" content="social media, glassmorphism, SPA, Express.js, premium UI, VibeNet">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- SVG Icon Sprites (Inline definitions for absolute reliability and lightning-fast rendering) -->
  <svg style="display: none;">
    <defs>
      <!-- Pink to Purple Gradient Definition for Brand Icons -->
      <linearGradient id="pink-purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ec4899" />
        <stop offset="100%" stop-color="#8b5cf6" />
      </linearGradient>
      
      <!-- Cyan to Blue Gradient Definition -->
      <linearGradient id="cyan-blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#06b6d4" />
        <stop offset="100%" stop-color="#3b82f6" />
      </linearGradient>
      
      <!-- Home Icon -->
      <g id="icon-home">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </g>
      
      <!-- Compass / Explore Icon -->
      <g id="icon-explore">
        <circle cx="12" cy="12" r="10"></circle>
        <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
      </g>
      
      <!-- Notification Bell -->
      <g id="icon-bell">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
      </g>
      
      <!-- Profile User Icon -->
      <g id="icon-user">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </g>
      
      <!-- Plus Sign -->
      <g id="icon-plus">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </g>
      
      <!-- Heart Icon -->
      <g id="icon-heart">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
      </g>
      
      <!-- Comment Bubble Icon -->
      <g id="icon-comment">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </g>
      
      <!-- Trash Can Icon -->
      <g id="icon-trash">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        <line x1="10" y1="11" x2="10" y2="17"></line>
        <line x1="14" y1="11" x2="14" y2="17"></line>
      </g>
      
      <!-- Search Magnifier Icon -->
      <g id="icon-search">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </g>
      
      <!-- Trending/Sparkle Arrow Icon -->
      <g id="icon-trending">
        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
        <polygon points="17 6 23 6 23 12"></polygon>
      </g>
      
      <!-- Logout Icon -->
      <g id="icon-logout">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </g>
      
      <!-- Edit Profile Pencil Icon -->
      <g id="icon-edit">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
        <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
      </g>
      
      <!-- Image Upload Icon -->
      <g id="icon-image">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <circle cx="8.5" cy="8.5" r="1.5"></circle>
        <polyline points="21 15 16 10 5 21"></polyline>
      </g>
      
      <!-- Globe Icon for explore fallback -->
      <g id="icon-globe">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="2" y1="12" x2="22" y2="12"></line>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
      </g>
      
      <!-- Close/X Icon -->
      <g id="icon-close">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </g>
      
      <!-- Send Icon -->
      <g id="icon-send">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </g>
    </defs>
  </svg>

  <!-- ==========================================
       1. REGISTER / LOGIN AUTHENTICATION VIEW
       ========================================== -->
  <div class="auth-wrapper" id="auth-screen">
    <div class="auth-card glass">
      <div class="auth-header">
        <div class="auth-logo">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke-width="2"><use href="#icon-explore"></use></svg>
          VibeNet
        </div>
        <p class="auth-subtitle" id="auth-subtitle-text">Connect to the glowing social hub.</p>
      </div>

      <!-- Authentication Form -->
      <form id="auth-form" onsubmit="handleAuthSubmit(event)">
        <!-- Display Name Field (Only visible on Registration) -->
        <div class="form-group" id="group-displayname" style="display: none;">
          <label for="auth-displayname">Full Name</label>
          <input type="text" id="auth-displayname" class="form-input" placeholder="e.g. Jane Doe">
        </div>
        
        <div class="form-group">
          <label for="auth-username">Username</label>
          <input type="text" id="auth-username" class="form-input" required placeholder="e.g. janedoe" autocomplete="username">
        </div>

        <div class="form-group">
          <label for="auth-password">Password</label>
          <input type="password" id="auth-password" class="form-input" required placeholder="••••••••" autocomplete="current-password">
        </div>

        <button type="submit" class="btn-modal-action" id="btn-auth-submit" style="margin-top: 10px;">Sign In</button>
      </form>

      <div class="auth-toggle">
        <span id="auth-toggle-prompt">Don't have an account?</span>
        <span id="auth-toggle-link" onclick="toggleAuthMode()">Sign Up</span>
      </div>
    </div>
  </div>

  <!-- ==========================================
       2. CORE APPLICATION VIEW (AUTHENTICATED)
       ========================================== -->
  <div class="app-wrapper" id="app-screen" style="display: none;">
    <div class="app-container">
      
      <!-- LEFT SIDEBAR: NAVIGATION -->
      <aside class="sidebar-left glass">
        <div>
          <div class="brand">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="2.5"><use href="#icon-explore"></use></svg>
            VibeNet
          </div>
          
          <nav>
            <ul class="nav-links">
              <li class="nav-item active" id="nav-home">
                <a href="#feed" onclick="switchTab('feed')">
                  <svg><use href="#icon-home"></use></svg>
                  Home Feed
                </a>
              </li>
              <li class="nav-item" id="nav-explore">
                <a href="#explore" onclick="switchTab('explore')">
                  <svg><use href="#icon-explore"></use></svg>
                  Explore Hub
                </a>
              </li>
              <li class="nav-item" id="nav-notifications">
                <a href="#notifications" onclick="switchTab('notifications')">
                  <svg><use href="#icon-bell"></use></svg>
                  Notifications
                </a>
              </li>
              <li class="nav-item" id="nav-profile">
                <a href="#profile" onclick="navigateToMyProfile()">
                  <svg><use href="#icon-user"></use></svg>
                  My Profile
                </a>
              </li>
              <li class="nav-item" id="nav-logout">
                <a href="#" onclick="handleLogout(event)">
                  <svg><use href="#icon-logout"></use></svg>
                  Logout
                </a>
              </li>
            </ul>
          </nav>
          
          <button class="btn-create-post" onclick="openCreatePostModal()">
            <svg><use href="#icon-plus"></use></svg>
            Vibe Post
          </button>
        </div>

        <!-- Sticky Active User Profile Badge -->
        <div class="user-badge glass glass-interactive" id="active-user-badge" onclick="navigateToMyProfile()">
          <!-- Populated by JavaScript -->
        </div>
      </aside>

      <!-- CENTER CONTAINER: DYNAMIC VIEWS -->
      <main class="feed-container">
        
        <!-- HEADER PANEL -->
        <header class="feed-header glass">
          <h1 id="view-title">Home Feed</h1>
          <!-- Tabs visible in feed view -->
          <div class="feed-tabs" id="feed-view-tabs">
            <button class="feed-tab active" id="feed-tab-all" onclick="changeFeedFilter('all')">Global</button>
            <button class="feed-tab" id="feed-tab-followed" onclick="changeFeedFilter('followed')">Following</button>
          </div>
        </header>

        <!-- POST CREATOR CARD (Inline creator, top of feed) -->
        <section class="post-creator glass" id="post-creator-box">
          <div class="post-creator-input-container">
            <img id="creator-avatar" src="" alt="Profile Image">
            <div class="post-creator-form">
              <textarea class="post-creator-textarea" id="creator-text" placeholder="What's vibing with you today? Share a code, detail or graphic..."></textarea>
              
              <!-- Media attachment input URL (Glass style) -->
              <div class="media-preview-container" id="inline-media-preview-box">
                <img id="inline-media-img" src="" alt="Upload preview">
                <button class="btn-remove-media" onclick="removeInlineMedia()"><svg style="width:14px; height:14px; stroke:currentColor;"><use href="#icon-close"></use></svg></button>
              </div>

              <div class="post-creator-actions">
                <div class="post-creator-tools">
                  <button class="tool-btn" onclick="promptAddMedia()">
                    <svg><use href="#icon-image"></use></svg>
                    Add Image
                  </button>
                </div>
                <button class="btn-submit-post" onclick="submitPost()">Post Vibe</button>
              </div>
            </div>
          </div>
        </section>

        <!-- DYNAMIC CONTENT PORTAL (Feeds / Profiles / Explore are rendered here) -->
        <div id="dynamic-content-portal" style="display: flex; flex-direction: column; gap: 24px;">
          <!-- Loaded dynamically by JavaScript -->
        </div>

      </main>

      <!-- RIGHT SIDEBAR: EXPLORE AND TRENDS -->
      <aside class="sidebar-right">
        <!-- Search Glass Box -->
        <div class="search-box glass">
          <svg><use href="#icon-search"></use></svg>
          <input type="text" id="global-search-input" placeholder="Search VibeNet..." onkeypress="handleSearchKeyPress(event)">
        </div>

        <!-- Who to Follow Recommendations -->
        <div class="follow-suggestions glass">
          <h2 class="sidebar-title">Who to Follow</h2>
          <div class="suggestions-list" id="suggestions-container">
            <!-- Rendered by JavaScript -->
          </div>
        </div>

        <!-- Trending Topics Panel -->
        <div class="trends-panel glass">
          <h2 class="sidebar-title">Vibing Right Now</h2>
          <ul class="trends-list" id="trends-container">
            <!-- Rendered by JavaScript -->
          </ul>
        </div>
      </aside>

    </div>
  </div>

  <!-- ==========================================
       3. MODALS, DRAWERS AND TOAST NOTIFICATIONS
       ========================================== -->

  <!-- Modal Overlay Drawer -->
  <div class="overlay" id="modal-overlay" onclick="closeAllModals()">
    
    <!-- Profile Edit Modal -->
    <div class="modal glass" id="edit-profile-modal" onclick="event.stopPropagation()">
      <header class="modal-header">
        <h3 class="modal-title">Tune Your Profile</h3>
        <button class="btn-close" onclick="closeAllModals()"><svg style="width: 20px; height: 20px; stroke: currentColor;"><use href="#icon-close"></use></svg></button>
      </header>
      <form id="edit-profile-form" onsubmit="submitProfileEdit(event)">
        <div class="form-group">
          <label for="edit-display-name">Display Name</label>
          <input type="text" id="edit-display-name" class="form-input" required>
        </div>
        <div class="form-group">
          <label for="edit-bio">Bio Details</label>
          <textarea id="edit-bio" class="form-textarea" rows="3" placeholder="Tell us about yourself..."></textarea>
        </div>
        <div class="form-group">
          <label for="edit-avatar">Avatar URL</label>
          <input type="url" id="edit-avatar" class="form-input" placeholder="https://images.unsplash.com/photo-...">
        </div>
        <div class="form-group">
          <label for="edit-cover">Cover Banner URL</label>
          <input type="url" id="edit-cover" class="form-input" placeholder="https://images.unsplash.com/photo-...">
        </div>
        <button type="submit" class="btn-modal-action">Save Changes</button>
      </form>
    </div>

    <!-- Create Post Pop-up Modal -->
    <div class="modal glass" id="create-post-modal" onclick="event.stopPropagation()">
      <header class="modal-header">
        <h3 class="modal-title">Broadcast a New Vibe</h3>
        <button class="btn-close" onclick="closeAllModals()"><svg style="width: 20px; height: 20px; stroke: currentColor;"><use href="#icon-close"></use></svg></button>
      </header>
      <div class="form-group">
        <textarea id="modal-post-text" class="form-textarea" rows="4" placeholder="What's on your mind? Share hashtags #UI #Dev..."></textarea>
      </div>
      <div class="form-group">
        <label for="modal-post-media">Media Image URL (Optional)</label>
        <input type="url" id="modal-post-media" class="form-input" placeholder="https://images.unsplash.com/photo-...">
      </div>
      <button onclick="submitModalPost()" class="btn-modal-action">Publish Vibe</button>
    </div>

  </div>

  <!-- Comments Slider Drawer -->
  <div class="comments-drawer" id="comments-drawer">
    <header class="comments-drawer-header">
      <h3 style="font-family: var(--font-display); font-weight: 800; font-size: 18px; color: var(--text-primary);">Comments</h3>
      <button class="btn-close" onclick="closeCommentsDrawer()"><svg style="width: 20px; height: 20px; stroke: currentColor; stroke-width: 2;"><use href="#icon-close"></use></svg></button>
    </header>
    
    <!-- Comment Scroll Area -->
    <div class="comments-list" id="comments-list-container">
      <!-- Populated by JavaScript -->
    </div>

    <!-- Sticky Comment Creation Form -->
    <div class="comment-input-area">
      <form class="comment-form" onsubmit="submitComment(event)">
        <textarea class="comment-textarea" id="comment-textarea" placeholder="Add a comment to this vibe..." required></textarea>
        <button type="submit" class="btn-comment-submit">
          <svg><use href="#icon-send"></use></svg>
        </button>
      </form>
    </div>
  </div>

  <!-- Bottom Navigation Bar for Mobile Layouts -->
  <nav class="bottom-nav">
    <a href="#feed" class="bottom-nav-item active" id="bnav-home" onclick="switchTab('feed')">
      <svg><use href="#icon-home"></use></svg>
    </a>
    <a href="#explore" class="bottom-nav-item" id="bnav-explore" onclick="switchTab('explore')">
      <svg><use href="#icon-explore"></use></svg>
    </a>
    <a href="#notifications" class="bottom-nav-item" id="bnav-notifications" onclick="switchTab('notifications')">
      <svg><use href="#icon-bell"></use></svg>
    </a>
    <a href="#profile" class="bottom-nav-item" id="bnav-profile" onclick="navigateToMyProfile()">
      <svg><use href="#icon-user"></use></svg>
    </a>
  </nav>

  <!-- Toast Errors/Success Container Portal -->
  <div class="toast-container" id="toast-portal"></div>

  <!-- Core JavaScript Frontend App Modules -->
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
